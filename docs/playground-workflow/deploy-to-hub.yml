name: Deploy Experiment to Hub

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'experiment.json'
      - 'package.json'
      - 'vite.config.ts'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload dist for Hub
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  register-with-hub:
    needs: deploy-pages
    runs-on: ubuntu-latest
    if: vars.HUB_API_URL != ''
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: experiment.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Read experiment metadata
        id: meta
        run: |
          if [ -f experiment.json ]; then
            NAME=$(jq -r '.name // empty' experiment.json)
            DESC=$(jq -r '.description // empty' experiment.json)
            TAGS=$(jq -c '.tags // []' experiment.json)
            SERVICES=$(jq -c '.azureServices // []' experiment.json)
            LAYOUT=$(jq -r '.layout // "full-width"' experiment.json)
          fi
          echo "name=${NAME:-${{ github.event.repository.name }}}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC:-Experiment from ${{ github.repository }}}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS:-[]}" >> "$GITHUB_OUTPUT"
          echo "services=${SERVICES:-[]}" >> "$GITHUB_OUTPUT"
          echo "layout=${LAYOUT:-full-width}" >> "$GITHUB_OUTPUT"

      - name: Register experiment with Hub
        id: register
        env:
          HUB_API_URL: ${{ vars.HUB_API_URL }}
          DEPLOY_KEY: ${{ secrets.HUB_DEPLOY_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${HUB_API_URL}/api/deploy" \
            -H "Content-Type: application/json" \
            -H "x-deploy-key: ${DEPLOY_KEY}" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg name "${{ steps.meta.outputs.name }}" \
              --arg desc "${{ steps.meta.outputs.description }}" \
              --arg layout "${{ steps.meta.outputs.layout }}" \
              --argjson tags '${{ steps.meta.outputs.tags }}' \
              --argjson services '${{ steps.meta.outputs.services }}' \
              '{
                repoOwner: $owner,
                repoName: $repo,
                experimentName: $name,
                description: $desc,
                layout: $layout,
                tags: $tags,
                azureServices: $services
              }'
            )")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Hub API response (HTTP ${HTTP_CODE}):"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Hub registration failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          # Extract upload details from response
          UPLOAD_URL=$(echo "$BODY" | jq -r '.uploadUrl')
          PROJECT_ID=$(echo "$BODY" | jq -r '.projectId')
          VERSION=$(echo "$BODY" | jq -r '.version')

          echo "upload_url=${UPLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "::notice::Experiment registered — project ${PROJECT_ID} v${VERSION}"

      - name: Capture screenshot
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install --with-deps chromium
          python3 -m http.server 8080 --directory dist &
          sleep 2
          node << 'SCREENSHOT'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 1200, height: 630 } });
            await page.goto('http://localhost:8080', { waitUntil: 'networkidle', timeout: 30000 });
            await page.screenshot({ path: 'dist/thumbnail.png', type: 'png' });
            await browser.close();
            console.log('Screenshot captured: dist/thumbnail.png');
          })();
          SCREENSHOT

      - name: Upload to Hub blob storage
        if: steps.register.outputs.upload_url != ''
        env:
          UPLOAD_URL: ${{ steps.register.outputs.upload_url }}
          PROJECT_ID: ${{ steps.register.outputs.project_id }}
          VERSION: ${{ steps.register.outputs.version }}
        run: |
          # Construct destination URL with project path
          BASE_URL="${UPLOAD_URL%%\?*}"
          SAS_TOKEN="${UPLOAD_URL#*\?}"
          DEST="${BASE_URL}/${PROJECT_ID}/v${VERSION}?${SAS_TOKEN}"

          azcopy copy "dist/*" "$DEST" --recursive --put-md5

          echo "::notice::Files uploaded to blob storage at ${PROJECT_ID}/v${VERSION}"
